name: scan
version: 0.3.0
description: >
  OCR images and scanned PDFs into the knowledge store.
  Processes JPEG, PNG, TIFF, BMP, GIF, WEBP images and image-only PDFs
  via tesseract. Emits one markdown file per document. Silently skips files
  whose OCR output falls below the minimum character threshold.

creates_dirs:
  - scans
  - originals/scans
  - inbox/scans

config:
  source_dir:
    required: false
    default: ""
    description: >
      Optional directory to scan recursively for image and PDF files. Read-only.
      When empty, only items already in the store inbox (deposited by zkm-eml,
      zkm-photo, or other plugins) are processed.
  lang:
    required: false
    default: "deu+eng"
    description: >
      Tesseract language(s) to use, joined with '+' (e.g. 'deu+eng', 'eng').
      The corresponding tesseract language packs must be installed on the system.
  min_text_chars:
    required: false
    default: 10
    description: >
      Minimum number of OCR characters required to emit an md file.
      Files below this threshold are silently skipped (already-scanned images
      with no readable content, blank pages, etc.).
  dpi:
    required: false
    default: 300
    description: >
      DPI (dots per inch) used when rasterizing PDF pages for OCR. Higher
      values produce better OCR quality at the cost of memory and speed.
      Default 300 is chosen for OCR quality over pdf2image's implicit 200.
  pdf_text_threshold:
    required: false
    default: 100
    description: >
      Minimum extractable character count for a PDF to be considered a
      "text PDF" (zkm-pdf territory). PDFs with at least this many extractable
      characters are skipped (logged to zkm-scan-skipped.jsonl, reason
      "text-layer"); scanned-only PDFs with fewer chars are OCR'd as usual.
      Mirrors zkm-pdf's min_text_chars for routing parity.
